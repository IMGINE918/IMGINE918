version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-student_management}
      MYSQL_USER: ${MYSQL_USER:-student}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-student123}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: student-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-mcp
    environment:
      DB_URL: ${DB_URL:-mysql+pymysql://student:student123@mysql:3306/student_management}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.deepseek.com}
      AI_MODEL: ${AI_MODEL:-deepseek-chat}
    depends_on:
      mysql:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  mysql-data:
  redis-data:
