version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: student_management
      MYSQL_USER: student
      MYSQL_PASSWORD: student123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - student-network

  # Spring Boot 应用（预留，用于未来升级）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: student-app
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/student_management?useSSL=false
      SPRING_DATASOURCE_USERNAME: student
      SPRING_DATASOURCE_PASSWORD: student123
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - student-network

  # Redis 缓存（预留，用于 AI 查询缓存）
  redis:
    image: redis:7-alpine
    container_name: student-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - student-network

volumes:
  mysql-data:
  redis-data:

networks:
  student-network:
    driver: bridge
