name: Repository Sanity

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sanity-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fail if .env is committed
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env must not be committed. Use .env.example instead."
            exit 1
          fi

      - name: Ensure key files exist
        run: |
          test -f README.md
          test -f Dockerfile
          test -f docker-compose.yml
          test -f mcp-server/server.py
          test -f mcp-server/requirements.txt

  docker-build:
    runs-on: ubuntu-latest
    needs: sanity-check

    steps:
      - uses: actions/checkout@v4

      - name: Build MCP server image
        run: docker build -t imgine918/student-management-mcp:ci .
