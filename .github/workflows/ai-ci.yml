name: MCP Server CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MCP server dependencies
        run: pip install -r mcp-server/requirements.txt

      - name: Syntax check
        run: python -m py_compile mcp-server/server.py mcp-server/config_loader.py

      - name: Ensure example env exists
        run: test -f .env.example
